name: Build

on:
  workflow_call:
    inputs:
      dotnet-version:
        required: false
        type: string
        default: "10.x"
      image-name:
        required: false
        type: string
        default: chatgptintegrationwithtelegrambot-ci
    secrets:
      TELEGRAM_BOT_TOKEN:
        required: true
      TELEGRAM_PUBLIC_WEBHOOK_URL:
        required: true
      TELEGRAM_WEBHOOK_SECRET_TOKEN:
        required: true
      OPENAI_API_KEY:
        required: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run Docker health check
        uses: ./.github/actions/docker-health-check
        with:
          image-name: ${{ inputs.image-name }}
          telegram-bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          telegram-public-webhook-url: ${{ secrets.TELEGRAM_PUBLIC_WEBHOOK_URL }}
          telegram-webhook-secret-token: ${{ secrets.TELEGRAM_WEBHOOK_SECRET_TOKEN }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
