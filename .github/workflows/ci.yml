name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches-ignore:
      - main

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run Docker health check
        run: |
          docker build --tag chatgptintegrationwithtelegrambot-ci .
          container_id=$(docker run --detach --rm --publish 8080:8080 chatgptintegrationwithtelegrambot-ci)

          cleanup() {
            docker stop "$container_id" >/dev/null
          }

          trap cleanup EXIT

          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error http://127.0.0.1:8080/health; then
              exit 0
            fi

            if [ "$attempt" -eq 30 ]; then
              docker logs "$container_id"
              echo "Health check endpoint did not become ready in time."
              exit 1
            fi

            sleep 2
          done

