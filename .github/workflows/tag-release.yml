name: Tag Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish Tagged Build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Validate SemVer tag
        run: echo "${GITHUB_REF_NAME}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'

      - name: Restore
        run: dotnet restore src/WebService/WebService.csproj

      - name: Publish
        run: dotnet publish src/WebService/WebService.csproj --configuration Release --no-restore --output ./artifacts/publish

      - name: Run Docker health check
        run: |
          docker build --tag chatgptintegrationwithtelegrambot-release .
          container_id=$(docker run --detach --rm --publish 8080:8080 chatgptintegrationwithtelegrambot-release)

          cleanup() {
            docker stop "$container_id" >/dev/null
          }

          trap cleanup EXIT

          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error http://127.0.0.1:8080/health; then
              exit 0
            fi

            if [ "$attempt" -eq 30 ]; then
              docker logs "$container_id"
              echo "Health check endpoint did not become ready in time."
              exit 1
            fi

            sleep 2
          done

      - name: Create ZIP package
        run: cd ./artifacts/publish && zip -r ../ChatGPTIntegrationWithTelegramBot-${{ github.ref_name }}.zip .

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChatGPTIntegrationWithTelegramBot-${{ github.ref_name }}
          path: ./artifacts/ChatGPTIntegrationWithTelegramBot-${{ github.ref_name }}.zip
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/ChatGPTIntegrationWithTelegramBot-${{ github.ref_name }}.zip
          generate_release_notes: true